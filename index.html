<!-- ========== SCRIPT UTAMA ========== -->
<script>
    // === KONFIGURASI ===
    const WA_CONFIG = {
        number: "6281234567890", // Ganti dengan nomor WhatsApp Anda
        sapa: "Admin",
        websiteName: "Rizki Abadi Canopy",
        defaultCity: "Membrane"
    };

    // === FUNGSI UTAMA ===
    function getCityFromURL() {
        // Method 1: Query string parameter 'kota'
        const urlParams = new URLSearchParams(window.location.search);
        let city = urlParams.get('kota');
        
        // Method 2: Path URL (/kota/bandung)
        if (!city) {
            const pathSegments = window.location.pathname.split('/');
            const kotaIndex = pathSegments.indexOf('kota');
            if (kotaIndex !== -1 && pathSegments[kotaIndex + 1]) {
                city = pathSegments[kotaIndex + 1];
            }
        }
        
        // Method 3: Hash URL
        if (!city && window.location.hash) {
            const hashParams = new URLSearchParams(window.location.hash.replace('#', '?'));
            city = hashParams.get('kota');
        }
        
        // Method 4: Session/Local Storage
        if (!city) {
            city = localStorage.getItem('userCity');
        }
        
        // Default jika semua gagal
        if (!city) {
            city = WA_CONFIG.defaultCity;
        }
        
        return city;
    }

    function formatCityName(city) {
        // Kapitalisasi awal setiap kata
        return city.split(' ').map(word => 
            word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
        ).join(' ');
    }

    function generateCityVariations(city) {
        const variations = [];
        const formatted = formatCityName(city);
        const lower = city.toLowerCase();
        const upper = city.toUpperCase();
        
        variations.push(formatted, lower, upper);
        
        // Tambahkan dengan awalan "Kanopi"
        if (!lower.includes('kanopi')) {
            variations.push(`Kanopi ${formatted}`);
            variations.push(`kanopi ${lower}`);
        }
        
        return variations;
    }

    function updateSEO(city) {
        if (!city) return;
        
        const formattedCity = formatCityName(city);
        const variations = generateCityVariations(city);
        
        // === 1. Update Title ===
        const titleElement = document.getElementById('dynamicTitle') || document.querySelector('title');
        if (titleElement) {
            const titles = [
                `Jasa Pasang Kanopi ${formattedCity} - Spesialis Kanopi Membrane`,
                `Kanopi ${formattedCity} | Harga Terbaik & Garansi 12 Tahun`,
                `Pemasangan Kanopi ${formattedCity} - Rizki Abadi Canopy`,
                `Kanopi Membrane ${formattedCity} - Konsultasi Gratis`
            ];
            titleElement.textContent = titles[0];
        }

        // === 2. Update Meta Description ===
        const descElement = document.getElementById('dynamicDescription') || document.querySelector('meta[name="description"]');
        if (descElement) {
            const descriptions = [
                `Jasa pemasangan kanopi ${formattedCity} terbaik. Harga kompetitif, garansi 12 tahun, pemasangan rapi dan tahan lama. Konsultasi gratis via WA!`,
                `Spesialis kanopi ${formattedCity} dengan material berkualitas premium. Pengerjaan profesional dan hasil memuaskan.`,
                `Butuh kanopi ${formattedCity}? Rizki Abadi Canopy solusi terbaik dengan harga terjangkau dan kualitas terjamin.`
            ];
            descElement.setAttribute('content', descriptions[0]);
        }

        // === 3. Update Open Graph ===
        const ogTitle = document.getElementById('ogTitle') || document.querySelector('meta[property="og:title"]');
        if (ogTitle) {
            ogTitle.setAttribute('content', `Kanopi ${formattedCity} - Rizki Abadi Canopy`);
        }
        
        const ogDesc = document.getElementById('ogDescription') || document.querySelector('meta[property="og:description"]');
        if (ogDesc) {
            ogDesc.setAttribute('content', `Spesialis kanopi ${formattedCity} berkualitas. Pemasangan rapi, kuat, dan tahan lama dengan garansi 12 tahun.`);
        }

        // === 4. Update Canonical URL ===
        const canonical = document.getElementById('canonicalLink') || document.querySelector('link[rel="canonical"]');
        if (canonical) {
            const baseUrl = window.location.origin + window.location.pathname;
            const params = new URLSearchParams(window.location.search);
            params.set('kota', city);
            canonical.href = baseUrl + '?' + params.toString();
        }

        // === 5. Update Twitter Card ===
        const twitterTitle = document.getElementById('twitterTitle') || document.querySelector('meta[name="twitter:title"]');
        if (twitterTitle) {
            twitterTitle.setAttribute('content', `Kanopi ${formattedCity} Terbaik`);
        }
        
        const twitterDesc = document.getElementById('twitterDescription') || document.querySelector('meta[name="twitter:description"]');
        if (twitterDesc) {
            twitterDesc.setAttribute('content', `Spesialis kanopi ${formattedCity} dengan garansi 12 tahun.`);
        }

        // === 6. Update H1/H2 ===
        document.querySelectorAll('h1, h2, h3').forEach(el => {
            const text = el.textContent;
            if (text && (text.includes('Membrane') || text.includes('Kanopi'))) {
                el.textContent = text.replace(/Membrane/g, formattedCity).replace(/membrane/g, city.toLowerCase());
            }
        });

        // === 7. Update Element IDs ===
        const cityElements = ['cityTitle', 'heroCity', 'aboutCity'];
        cityElements.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.textContent = formattedCity;
            }
        });

        // === 8. Update WhatsApp Links ===
        const waLinks = [
            'waLinkHero', 'waLinkAbout', 'waLinkWorkflow',
            'waLinkMembran', 'waLinkAlderon', 'waLinkPolycarbonate',
            'waLinkTempered', 'waLinkSpandek', 'waLinkTestimonial'
        ];

        waLinks.forEach(id => {
            const link = document.getElementById(id);
            if (link) {
                const cityParam = city.toLowerCase() === 'membrane' ? '' : `%20di%20${city}`;
                const message = `Halo%20${WA_CONFIG.sapa},%20saya%20ingin%20konsultasi%20tentang%20canopy${cityParam},%20Terimakasih.`;
                link.href = `https://wa.me/${WA_CONFIG.number}?text=${message}`;
            }
        });

        // === 9. Update Local Business Schema ===
        const localSchema = document.getElementById('localBusinessSchema');
        if (localSchema) {
            try {
                const schema = JSON.parse(localSchema.textContent);
                schema.name = `Rizki Abadi Canopy - Kanopi ${formattedCity}`;
                schema.description = `Jasa pemasangan kanopi ${formattedCity} berkualitas tinggi dengan garansi 12 tahun`;
                schema.address.addressLocality = city;
                localSchema.textContent = JSON.stringify(schema);
            } catch(e) {
                console.log('Schema update error:', e);
            }
        }

        // === 10. Update Breadcrumb ===
        const breadcrumbScripts = document.querySelectorAll('script[type="application/ld+json"]');
        breadcrumbScripts.forEach(script => {
            try {
                const data = JSON.parse(script.textContent);
                if (data['@type'] === 'BreadcrumbList') {
                    const items = data.itemListElement || [];
                    if (items.length > 1) {
                        items[1].name = `Jasa Kanopi ${formattedCity}`;
                        items[1].item = `https://rizkiabadicanopy.com/layanan?kota=${city}`;
                        script.textContent = JSON.stringify(data);
                    }
                }
            } catch(e) {}
        });

        // === 11. Generate Location-Specific Keywords ===
        const keywordMeta = document.querySelector('meta[name="keywords"]');
        if (keywordMeta) {
            const keywords = [
                `kanopi ${city}`,
                `jasa pasang kanopi ${city}`,
                `kanopi membrane ${city}`,
                `kanopi ${city} murah`,
                `pemasangan kanopi ${city}`,
                `tukang kanopi ${city}`,
                `kanopi rumah ${city}`,
                `kanopi minimalis ${city}`,
                `kanopi modern ${city}`,
                `kanopi teras ${city}`
            ];
            keywordMeta.setAttribute('content', keywords.join(', '));
        } else {
            const meta = document.createElement('meta');
            meta.name = 'keywords';
            meta.content = `kanopi ${city}, jasa pasang kanopi ${city}, kanopi membrane ${city}`;
            document.head.appendChild(meta);
        }

        // === 12. Simpan ke localStorage ===
        localStorage.setItem('userCity', city);
        
        console.log('SEO Updated untuk kota:', formattedCity);
    }

    // === EKSEKUSI ===
    document.addEventListener('DOMContentLoaded', function() {
        const city = getCityFromURL();
        
        // Update SEO
        updateSEO(city);
        
        // Tampilkan pesan jika kota custom
        const cityLower = city.toLowerCase();
        if (cityLower !== 'membrane') {
            console.log(`🚀 Optimasi SEO untuk Kanopi ${formatCityName(city)}`);
            console.log('💡 URL: ' + window.location.href);
        }
    });

    // === SLIDER SCRIPT ===
    (function() {
        const slides = document.querySelectorAll('.hero-slide');
        const dots = document.querySelectorAll('.slider-dot');
        const progressBar = document.querySelector('.slider-progress');
        let currentSlide = 1;
        const totalSlides = slides.length;
        let slideInterval = setInterval(nextSlide, 5000);
        let isTransitioning = false;

        function setActiveSlide(index) {
            if (isTransitioning) return;
            isTransitioning = true;
            if (index < 1) index = totalSlides;
            if (index > totalSlides) index = 1;
            
            slides.forEach(slide => {
                slide.classList.remove('active');
            });
            document.querySelector(`.hero-slide[data-slide="${index}"]`).classList.add('active');
            
            dots.forEach((dot, i) => {
                if (i+1 === index) {
                    dot.classList.add('bg-white');
                    dot.classList.remove('bg-white/60');
                } else {
                    dot.classList.remove('bg-white');
                    dot.classList.add('bg-white/60');
                }
            });

            progressBar.style.transition = 'none';
            progressBar.style.width = '0%';
            setTimeout(() => {
                progressBar.style.transition = 'width 5s linear';
                progressBar.style.width = '100%';
            }, 50);

            currentSlide = index;
            setTimeout(() => {
                isTransitioning = false;
            }, 1200);
        }

        function nextSlide() {
            let next = currentSlide + 1;
            if (next > totalSlides) next = 1;
            setActiveSlide(next);
        }

        dots.forEach((dot, idx) => {
            dot.addEventListener('click', () => {
                clearInterval(slideInterval);
                setActiveSlide(idx + 1);
                slideInterval = setInterval(nextSlide, 5000);
            });
        });

        setTimeout(() => {
            progressBar.style.transition = 'width 5s linear';
            progressBar.style.width = '100%';
        }, 100);

        setActiveSlide(1);
    })();

    // === TESTIMONIAL CAROUSEL ===
    (function() {
        const track = document.getElementById('testimonialTrack');
        const slides = document.querySelectorAll('.testimonial-carousel-slide');
        const prevBtn = document.getElementById('prevTestimonial');
        const nextBtn = document.getElementById('nextTestimonial');
        const dots = document.querySelectorAll('#testimonialDots button');
        let currentIndex = 0;
        const totalSlides = slides.length;

        function updateCarousel(index) {
            if (index < 0) index = totalSlides - 1;
            if (index >= totalSlides) index = 0;
            track.style.transform = `translateX(-${index * 100}%)`;
            dots.forEach((dot, i) => {
                if (i === index) {
                    dot.classList.add('bg-primary', 'scale-125');
                    dot.classList.remove('bg-primary/30', 'hover:bg-primary/60');
                } else {
                    dot.classList.remove('bg-primary', 'scale-125');
                    dot.classList.add('bg-primary/30', 'hover:bg-primary/60');
                }
            });
            currentIndex = index;
        }

        if (prevBtn) prevBtn.addEventListener('click', () => updateCarousel(currentIndex - 1));
        if (nextBtn) nextBtn.addEventListener('click', () => updateCarousel(currentIndex + 1));
        dots.forEach((dot, i) => {
            dot.addEventListener('click', () => updateCarousel(i));
        });

        setInterval(() => updateCarousel(currentIndex + 1), 5000);
    })();

    // === MODAL ===
    function openModal(src, caption) {
        const modal = document.getElementById('imageModal');
        if (modal) {
            document.getElementById('modalImage').src = src;
            document.getElementById('modalCaption').innerText = caption;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
    }

    function closeModal(e) {
        if(e && (e.target.classList.contains('modal-backdrop') || e.target.classList.contains('modal-close'))) {
            const modal = document.getElementById('imageModal');
            if (modal) {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }
        }
    }

    document.addEventListener('keydown', (e) => { 
        if(e.key === 'Escape') closeModal(e); 
    });

    // === GALLERY TABS ===
    (function() {
        const tabs = document.querySelectorAll('.gallery-tab');
        const galleries = document.querySelectorAll('.gallery-grid');
        
        function setActiveTab(category) {
            tabs.forEach(tab => {
                const tabCategory = tab.getAttribute('data-category');
                if (tabCategory === category) {
                    tab.classList.add('bg-primary', 'text-white', 'shadow-md');
                    tab.classList.remove('text-slate-600', 'dark:text-slate-300', 'hover:bg-primary/10');
                } else {
                    tab.classList.remove('bg-primary', 'text-white', 'shadow-md');
                    tab.classList.add('text-slate-600', 'dark:text-slate-300', 'hover:bg-primary/10');
                }
            });
            
            galleries.forEach(gallery => {
                const galleryCategory = gallery.getAttribute('data-category');
                if (galleryCategory === category) {
                    gallery.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
                    gallery.classList.add('opacity-100', 'translate-y-0', 'z-10');
                } else {
                    gallery.classList.remove('opacity-100', 'translate-y-0', 'z-10');
                    gallery.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
                }
            });
        }
        
        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                const category = this.getAttribute('data-category');
                setActiveTab(category);
            });
        });
        
        setActiveTab('hotel');
        
        function adjustContainerHeight() {
            const container = document.querySelector('.relative[style*="min-height: 320px"]');
            const activeGallery = document.querySelector('.gallery-grid.opacity-100');
            if (container && activeGallery) {
                const gridHeight = activeGallery.querySelector('.grid').offsetHeight;
                if (gridHeight > 320) {
                    container.style.minHeight = gridHeight + 'px';
                }
            }
        }
        
        setTimeout(adjustContainerHeight, 500);
        window.addEventListener('load', adjustContainerHeight);
    })();
</script>
